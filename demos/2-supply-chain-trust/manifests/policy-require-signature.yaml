apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-supply-chain-signatures
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 15
  rules:
    - name: require-signed-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/codebytes/guardian-demo-app*"
          attestors:
            - entries:
                - keys:
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      <INSERT YOUR cosign.pub CONTENTS HERE>
                      -----END PUBLIC KEY-----
    - name: require-minimum-scan-level
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Image must be labeled with vulnerability report showing no HIGH/CRITICAL findings"
        pattern:
          metadata:
            labels:
              guardian.dev/last-scan: "high-critical-clear"
